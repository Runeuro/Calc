<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор стоимости пластика для 3D-печати</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f4f8;
      color: #222;
    }

    .calculator {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 24px;
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 18px;
      border: 1px solid #d7dce5;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #4f7cff;
    }

    .result {
      margin-top: 10px;
      padding: 18px;
      border-radius: 14px;
      background: #eef4ff;
      text-align: center;
    }

    .result-title {
      margin-bottom: 8px;
      color: #555;
      font-size: 14px;
    }

    .result-value {
      font-size: 32px;
      font-weight: 700;
      color: #2457d6;
    }

    .formula {
      margin-top: 16px;
      color: #777;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="calculator">
    <h1>Стоимость пластика</h1>
    <p class="subtitle">Калькулятор сырой стоимости изделия для 3D-печати</p>

    <label for="plasticPrice">Цена пластика за 1000 г</label>
    <input id="plasticPrice" type="number" min="0" step="0.01" placeholder="Например: 1200" />

    <label for="modelWeight">Вес изделия, г</label>
    <input id="modelWeight" type="number" min="0" step="0.01" placeholder="Например: 75" />

    <label for="printTime">Время печати, минут</label>
    <input id="printTime" type="number" min="0" step="1" placeholder="Например: 240" />

    <section class="result">
      <div class="result-title">Итоговая стоимость</div>
      <div class="result-value" id="result">0.00 ₽</div>

      <div style="margin-top: 14px; color: #555; font-size: 14px; line-height: 1.7;">
        <div>Пластик: <strong id="plasticCost">0.00 ₽</strong></div>
        <div>Время печати: <strong id="timeCost">0 ₽</strong></div>
      </div>
    </section>

    <div class="formula">
      Формула: (цена за 1000 г ÷ 1000 × вес изделия) + время печати × 1 ₽
    </div>
  </main>

  <script>
    const plasticPriceInput = document.getElementById('plasticPrice');
    const modelWeightInput = document.getElementById('modelWeight');
    const resultElement = document.getElementById('result');
    const printTimeInput = document.getElementById('printTime');
    const plasticCostElement = document.getElementById('plasticCost');
    const timeCostElement = document.getElementById('timeCost');

    function calculatePlasticCost() {
      const plasticPrice = Number(plasticPriceInput.value);
      const modelWeight = Number(modelWeightInput.value);
      const printTime = Number(printTimeInput.value);

      const plasticCost = (plasticPrice / 1000) * modelWeight;
      const timeCost = printTime * 1;
      const totalCost = plasticCost + timeCost;

      plasticCostElement.textContent = `${plasticCost.toFixed(2)} ₽`;
      timeCostElement.textContent = `${timeCost.toFixed(2)} ₽`;
      resultElement.textContent = `${totalCost.toFixed(2)} ₽`;
    }

    plasticPriceInput.addEventListener('input', calculatePlasticCost);
    modelWeightInput.addEventListener('input', calculatePlasticCost);
    printTimeInput.addEventListener('input', calculatePlasticCost);
  </script>
</body>
</html>
